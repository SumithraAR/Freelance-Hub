{% extends "base.html" %}
{% block title %}Manage Profile{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header"><h2>✏️ Manage Profile</h2><p>Update your contact details</p></div>
  <div class="card" style="max-width:500px;">
    <form method="POST">
      <div class="form-group"><label>Phone Number</label><input type="tel" name="phone" value="{{ user[4] }}" required></div>
      <div class="form-group"><label>New Password</label><input type="password" name="password" value="{{ user[5] }}" required></div>
      <div style="display:flex;gap:.8rem;margin-top:1rem;">
        <button type="submit" class="btn btn-primary">💾 Update Profile</button>
        <a href="{{ url_for('employer.profile') }}" class="btn btn-outline">← Back</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
