{% extends "base.html" %}
{% block title %}Post Project{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header"><h2>➕ Post a New Project</h2><p>Let freelancers bid on your project</p></div>
  <div class="card" style="max-width:700px;">
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group"><label>Project Title</label><input type="text" name="title" placeholder="e.g. Website for my shop" required></div>
      <div class="form-group"><label>Description</label><textarea name="description" placeholder="Describe what you need..." required></textarea></div>
      <div class="form-group"><label>Skills Required</label><input type="text" name="skills" placeholder="e.g. Python, HTML, CSS, JavaScript" required></div>
      <div class="grid-2">
        <div class="form-group"><label>Budget (₹)</label><input type="number" name="budget" placeholder="10000" required></div>
        <div class="form-group"><label>Deadline</label><input type="date" name="deadline" required></div>
      </div>
      <div class="form-group"><label>Attach PDF (Optional)</label><input type="file" name="attachment" accept=".pdf"></div>
      <button type="submit" class="btn btn-accent" style="margin-top:.5rem;">🚀 Post Project</button>
    </form>
  </div>
</div>
{% endblock %}
