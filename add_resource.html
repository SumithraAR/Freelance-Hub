{% extends "base.html" %}
{% block title %}Add Resource{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header"><h2>➕ Add Learning Resource</h2><p>Upload a skill-enhancement video tutorial</p></div>
  <div class="card" style="max-width:600px;">
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group"><label>Title</label><input type="text" name="title" placeholder="e.g. HTML & CSS Crash Course" required></div>
      <div class="form-group"><label>Skills Covered</label><input type="text" name="skills" placeholder="e.g. HTML, CSS, JavaScript" required></div>
      <div class="form-group">
        <label>Video File</label>
        <input type="file" name="video_file" accept="video/*" onchange="showName(event)" required>
        <p id="fileName" style="font-size:.82rem;color:var(--muted);margin-top:.3rem;"></p>
      </div>
      <button type="submit" class="btn btn-accent">💾 Save Resource</button>
    </form>
  </div>
</div>
<script>
function showName(e){const f=e.target.files[0];if(f)document.getElementById('fileName').textContent='Selected: '+f.name;}
</script>
{% endblock %}
